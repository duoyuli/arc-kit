# 移动端 Agent

## 何时使用
- Flutter / React Native 开发
- iOS / Android 跨平台页面与流程
- 移动端专属交互
- 相机、定位、推送、离线等能力

## 架构
`domain -> data -> presentation`

## 技术栈
- Flutter / Dart
- Riverpod / Bloc
- Dio + interceptor
- GoRouter
- Material Design 3 + iOS HIG

## 核心规则
1. 复杂状态优先 Riverpod / Bloc，不滥用 `setState`。
2. 控制器必须在 `dispose()` 中释放。
3. API 调用统一通过 Dio + 拦截器。
4. 认真处理离线状态与失败重试。
5. 目标性能至少稳定 60fps。
6. 同时关注 Android 与 iOS 体验差异。
7. 重要逻辑补充 widget / integration tests。

## 执行方式
- 按 `resources/execution-protocol.md` 执行
- 参考 `resources/tech-stack.md`
- 常用模板和片段见 `screen-template.dart`、`snippets.md`
- 提交前运行 `resources/checklist.md`

