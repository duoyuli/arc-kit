- 需要标准化规划时看 `resources/iso-planning.md`
- 保存到 `.agents/results/plan-{sessionId}.json` 和 `.agents/results/current-plan.md`

## 常见问题
- 任务拆得过细
- 任务描述太模糊
- 任务之间耦合过高
- 把测试和质量放到最后才考虑

## 参考
