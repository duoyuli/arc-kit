# 任务 slug，用于目录名和群同步消息前缀
slug: [task-slug]

# 广播目标：任务进展/异常/完成的唯一正式出口
# 通过机器人按 channel + to 发到 IM 群，不是 OpenClaw session
broadcast:
  mode: announce
  channel: [feishu|telegram]  # IM 平台
  to: [群标识]                 # Feishu: oc_xxx, Telegram: -1001234567890

# submitted 后 leader agent 验收的 SLA（分钟）
accept_sla_min: 5

# 巡检摘要，由 Cron 1 自动维护（只写结论，不写长解释）
patrol_notes: ""

# 双 cron 的 jobId，任务正式开工前必须回写
automation:
  patrol_sync_job_id: ""    # Cron 1 (状态同步) 的 jobId
  patrol_trigger_job_id: "" # Cron 2 (决策触发) 的 jobId

# 子任务列表
tasks:
  - id: T1                          # 任务 ID
    agent: [agent-name]             # 执行此任务的 follower agent
    goal: [一句话描述]               # 任务目标
    deadline: [ISO 8601 时间]        # 截止时间，如 2026-03-13T23:00:00+08:00
    status: assigned                # 初始状态为 assigned
    depends_on: []                  # 依赖的 task ID 列表
    rejection_note: ""              # 被退回时由 leader agent 填写原因
    artifacts: ""                   # 最新提交的产物路径（由 cron 回写）
    submitted_at: ""                # 最近一次进入 submitted 的时间
    last_log_at: ""                 # 最近一条日志时间
  - id: T2
    agent: [agent-name]
    goal: [一句话描述]
    deadline: [ISO 8601 时间]
    status: assigned
    depends_on: []
    rejection_note: ""
    artifacts: ""
    submitted_at: ""
    last_log_at: ""
  - id: T3
    agent: [agent-name]
    goal: [一句话描述]
    deadline: [ISO 8601 时间]
    status: assigned
    depends_on: []
    rejection_note: ""
    artifacts: ""
    submitted_at: ""
    last_log_at: ""
